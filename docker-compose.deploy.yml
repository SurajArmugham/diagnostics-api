# ============================================================
# Deployment Compose File
#
# Purpose:
# Pull and run application images from Docker Hub.
#
# Used By:
# GitHub Actions CD Pipeline
#
# Deployment Commands:
# docker compose -f docker-compose.deploy.yml pull
# docker compose -f docker-compose.deploy.yml up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------
  postgres-db:

    image: postgres:16

    # Dedicated deployment container.
    # Avoids conflicts with local development containers.
    container_name: postgres-db-prod

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_prod_data:/var/lib/postgresql/data


  # ----------------------------------------------------------
  # Diagnostics API
  # ----------------------------------------------------------
  diagnostics-api:

    # Image produced by the CI pipeline and stored in Docker Hub.
    # Examples:
    # surajarmugham/diagnostics-api:latest
    # surajarmugham/diagnostics-api:a1b2c3d4
    # IMAGE_TAG is supplied by the CD pipeline.
    # --------------------------------------------------------
    # Static image tag currently deployed.
    #
    # Mirrors the Kubernetes deployment image while learning
    # Docker Compose CD and Kubernetes CD independently.
    #
    # Future Enhancement:
    # Re-enable dynamic image promotion using IMAGE_TAG from
    # the CI pipeline.
    # --------------------------------------------------------
    image: surajarmugham/diagnostics-api:036354e9c3ee587adebf372366b907cac39c2475
    # Previous dynamic image configuration:
    # image: surajarmugham/diagnostics-api:${IMAGE_TAG}

    # Dedicated deployment container.
    # Avoids conflicts with local development containers.
    container_name: diagnostics-api-prod

    depends_on:
      - postgres-db

    ports:
      - "8000:8000"

    # Runtime configuration.
    # Secrets continue to be sourced from the local .env file
    # on the deployment host.
    environment:
      SSH_HOST: host.docker.internal
      SSH_USER: ${SSH_USER}
      SSH_PASSWORD: ${SSH_PASSWORD}

      DB_HOST: postgres-db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # JWT authentication credentials.
      API_USERNAME: ${API_USERNAME}
      API_PASSWORD: ${API_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}


# ------------------------------------------------------------
# Persistent Database Storage
# ------------------------------------------------------------
volumes:

  # Persistent database storage for deployment environment.
  postgres_prod_data:
