services:

  postgres-db:

    image: postgres:16

    container_name: postgres-db

    environment:

      POSTGRES_USER: ${DB_USER}

      POSTGRES_PASSWORD: ${DB_PASSWORD}

      POSTGRES_DB: ${DB_NAME}

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data


  diagnostics-api:

    build: .

    container_name: diagnostics-api

    depends_on:

      - postgres-db

    ports:

      - "8000:8000"

    environment:

      SSH_HOST: host.docker.internal

      SSH_USER: ${SSH_USER}

      SSH_PASSWORD: ${SSH_PASSWORD}

      DB_HOST: postgres-db

      DB_PORT: ${DB_PORT}

      DB_NAME: ${DB_NAME}

      DB_USER: ${DB_USER}

      DB_PASSWORD: ${DB_PASSWORD}


volumes:

  postgres_data: