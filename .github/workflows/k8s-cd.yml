# ------------------------------------------------------------
# Kubernetes Continuous Deployment (CD)
# ------------------------------------------------------------
# Purpose:
# Deploy Kubernetes resources from GitHub Actions
# using a Self-Hosted Runner.
#
# Architecture:
#
# GitHub Action
#       ↓
# Self Hosted Runner (Mac)
#       ↓
# Infisical Cloud
#       ↓
# Kubernetes Secret
#       ↓
# kubectl
#       ↓
# kubeconfig (~/.kube/config)
#       ↓
# Kubernetes API Server
#       ↓
# Control Plane
#       ↓
# Pods
#
# Current Kubernetes Environment:
#
# Context:
# docker-desktop
#
# Node:
# desktop-control-plane
#
# Deployment Validation:
#
# kubectl apply -f k8s/
# sleep 10
# kubectl get pods
# kubectl port-forward service/diagnostics-api 8000:8000
# curl http://localhost:8000/health
#
# Expected Response:
# {"status":"UP"}
#
# Learning Goal:
# Demonstrate CI/CD deployment to Kubernetes using
# the same kubectl workflow commonly used in
# self-managed enterprise Kubernetes environments.
#
# Secret Management Enhancement:
#
# Infisical Cloud
#       ↓
# Universal Auth
#       ↓
# Secret Retrieval
#       ↓
# Kubernetes Secret
#       ↓
# Pods
#
# Secret rotation can now be performed in
# Infisical without modifying Kubernetes manifests.
# ------------------------------------------------------------

name: Kubernetes CD

on:
  workflow_dispatch:

jobs:

  deploy:

    runs-on: self-hosted

    steps:

      # ------------------------------------------------------
      # Download repository contents onto the self-hosted
      # runner so workflow files and Kubernetes manifests
      # are available locally.
      # ------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # Verify kubectl connectivity.
      #
      # current-context:
      # Shows which Kubernetes cluster kubectl will use.
      #
      # get nodes:
      # Confirms the Kubernetes API server is reachable.
      # ------------------------------------------------------
      - name: Verify Kubernetes Context
        run: |
          kubectl config current-context
          kubectl get nodes

      # ------------------------------------------------------
      # Retrieve Runtime Secrets From Infisical
      # ------------------------------------------------------
      # Purpose:
      # Authenticate to Infisical Cloud using a
      # Machine Identity and retrieve the latest
      # application credentials.
      #
      # Architecture:
      #
      # GitHub Actions
      #        ↓
      # INFISICAL_CLIENT_ID
      # INFISICAL_CLIENT_SECRET
      #        ↓
      # Universal Auth
      #        ↓
      # Access Token
      #        ↓
      # Infisical Cloud
      #        ↓
      # Secret Retrieval
      #        ↓
      # Kubernetes Secret
      #        ↓
      # Pods
      #
      # Secrets Retrieved:
      #
      # - DB_USER
      # - DB_PASSWORD
      # - SSH_USER
      # - SSH_PASSWORD
      # - API_USERNAME
      # - API_PASSWORD
      # - JWT_SECRET_KEY
      #
      # Benefits:
      #
      # - Centralized Secret Management
      # - Secret Rotation Support
      # - No Credentials Stored In Git
      # - Dynamic Kubernetes Secret Updates
      #
      # GitHub Repository Secrets:
      #
      # INFISICAL_CLIENT_ID
      # INFISICAL_CLIENT_SECRET
      #
      # GitHub Repository Variables:
      #
      # INFISICAL_PROJECT_ID
      # INFISICAL_ENVIRONMENT
      # ------------------------------------------------------
      - name: Retrieve Secrets From Infisical
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_ENVIRONMENT: ${{ vars.INFISICAL_ENVIRONMENT }}
        run: |

          echo "Authenticating to Infisical..."

          ACCESS_TOKEN=$(curl --silent \
            --location \
            --request POST \
            'https://app.infisical.com/api/v1/auth/universal-auth/login' \
            --header 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode "clientId=${INFISICAL_CLIENT_ID}" \
            --data-urlencode "clientSecret=${INFISICAL_CLIENT_SECRET}" \
            | jq -r '.accessToken')

          echo "Access token acquired."

          echo "Retrieving secrets from Infisical..."

          SECRET_RESPONSE=$(curl --silent \
            --request GET \
            --url "https://us.infisical.com/api/v4/secrets?secretPath=%2F&viewSecretValue=true&expandSecretReferences=true&recursive=false&includePersonalOverrides=false&includeImports=true&projectId=${INFISICAL_PROJECT_ID}&environment=${INFISICAL_ENVIRONMENT}" \
            --header "Authorization: Bearer ${ACCESS_TOKEN}")

          echo "Secrets retrieved successfully."

          echo "Validating secret count..."

          echo "$SECRET_RESPONSE" | jq '.secrets | length'

          DB_USER=$(echo "$SECRET_RESPONSE" | jq -r '.secrets[] | select(.secretKey=="DB_USER") | .secretValue')
          DB_PASSWORD=$(echo "$SECRET_RESPONSE" | jq -r '.secrets[] | select(.secretKey=="DB_PASSWORD") | .secretValue')
          SSH_USER=$(echo "$SECRET_RESPONSE" | jq -r '.secrets[] | select(.secretKey=="SSH_USER") | .secretValue')
          SSH_PASSWORD=$(echo "$SECRET_RESPONSE" | jq -r '.secrets[] | select(.secretKey=="SSH_PASSWORD") | .secretValue')
          API_USERNAME=$(echo "$SECRET_RESPONSE" | jq -r '.secrets[] | select(.secretKey=="API_USERNAME") | .secretValue')
          API_PASSWORD=$(echo "$SECRET_RESPONSE" | jq -r '.secrets[] | select(.secretKey=="API_PASSWORD") | .secretValue')
          JWT_SECRET_KEY=$(echo "$SECRET_RESPONSE" | jq -r '.secrets[] | select(.secretKey=="JWT_SECRET_KEY") | .secretValue')

          echo "Updating Kubernetes Secret..."

          kubectl create secret generic diagnostics-secret \
            --from-literal=DB_USER="$DB_USER" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=SSH_USER="$SSH_USER" \
            --from-literal=SSH_PASSWORD="$SSH_PASSWORD" \
            --from-literal=API_USERNAME="$API_USERNAME" \
            --from-literal=API_PASSWORD="$API_PASSWORD" \
            --from-literal=JWT_SECRET_KEY="$JWT_SECRET_KEY" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          echo "Kubernetes Secret updated successfully."

      # ------------------------------------------------------
      # Deploy all Kubernetes manifests.
      #
      # Includes:
      # - Deployments
      # - Services
      # - ConfigMaps
      # - PVCs
      # - Ingress
      # - TLS Resources
      # - Other Kubernetes resources stored in k8s/
      #
      # Kubernetes reconciliation loop will create or
      # update resources to match desired state.
      # ------------------------------------------------------
      # ------------------------------------------------------
      # GitOps Release Flow
      #
      # The image tag pinned in k8s/deployment.yaml is
      # the single source of truth. This workflow never
      # mutates images at runtime (no kubectl set image)
      # so the cluster always mirrors Git exactly and
      # a single rollout occurs per release.
      #
      # How to release a new image version:
      #
      # 1. Push code to main.
      #    CI builds and pushes:
      #    surajarmugham/diagnostics-api:<git-sha>
      #
      # 2. Verify the tag exists on Docker Hub.
      #
      # 3. Update the image tag pinned in
      #    k8s/deployment.yaml (and
      #    docker-compose.deploy.yml) to <git-sha>.
      #
      # 4. Commit with "[skip ci]" in the message so
      #    the manifest-pin push does not rebuild the
      #    image. Push to main.
      #
      # 5. GitHub → Actions → "Kubernetes CD" →
      #    Run workflow.
      # ------------------------------------------------------
      - name: Deploy Kubernetes Resources
        run: |
          kubectl apply -f k8s/

      # ------------------------------------------------------
      # Wait for the Deployment to converge on the
      # desired state before verification.
      #
      # rollout status blocks until all replicas are
      # updated and available, or fails the workflow
      # on timeout - catching image pull errors and
      # crash loops early.
      # ------------------------------------------------------
      - name: Wait For Rollout
        run: |
          kubectl rollout status deployment/diagnostics-api --timeout=180s

      # ------------------------------------------------------
      # Basic deployment verification.
      #
      # get pods:
      # Validate Pods are running.
      #
      # get deployments:
      # Validate desired replicas are available.
      #
      # get services:
      # Validate service discovery resources exist.
      #
      # get ingress:
      # Validate ingress resources exist.
      #
      # get secrets:
      # Validate diagnostics-secret exists.
      # ------------------------------------------------------
      - name: Verify Cluster Resources
        run: |
          kubectl get pods
          kubectl get deployments
          kubectl get services
          kubectl get ingress
          kubectl get secret diagnostics-secret

      # ------------------------------------------------------
      # Smoke Test
      #
      # Create temporary port-forward from runner
      # to Kubernetes Service.
      #
      # Service
      #      ↓
      # Pod
      #      ↓
      # FastAPI Application
      #
      # Health endpoint verifies application startup.
      #
      # Auth check verifies JWT protection is live:
      # POST /diagnostics WITHOUT a token must return
      # HTTP 401 - proves the API is secured without
      # needing any credentials on the runner.
      # ------------------------------------------------------
      - name: Smoke Test Diagnostics API
        run: |
          kubectl port-forward service/diagnostics-api 8000:8000 >/tmp/port-forward.log 2>&1 &

          sleep 5

          curl http://localhost:8000/health

          echo "Verifying authentication is enforced..."

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/diagnostics)

          echo "Unauthenticated /diagnostics returned: $STATUS"

          if [ "$STATUS" != "401" ]; then
            echo "ERROR: Expected 401 for unauthenticated request."
            exit 1
          fi

          echo "Authentication verified."