# ------------------------------------------------------------
# Prometheus Deployment
#
# Single replica - Prometheus is a stateful TSDB
# (time-series database); horizontal scaling means
# federation/sharding (Thanos, Mimir) in enterprises,
# far beyond this lab.
#
# Storage:
# emptyDir - metrics history lives as long as the pod.
# Restart = empty database. Deliberate for the lab;
# production uses a PVC (and long-term storage like
# Thanos for months of retention).
#
# The pod runs as the "prometheus" ServiceAccount so
# kubernetes_sd_configs may list pods (see
# prometheus-rbac.yaml).
# ------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:

    metadata:
      labels:
        app: prometheus

    spec:

      serviceAccountName: prometheus

      containers:

        - name: prometheus

          # Pinned like every image in this project.
          image: prom/prometheus:v3.13.1

          args:
            # Config from the ConfigMap volume below.
            - --config.file=/etc/prometheus/prometheus.yml
            # TSDB location (emptyDir volume).
            - --storage.tsdb.path=/prometheus
            # Keep 7 days of samples (lab-sized).
            - --storage.tsdb.retention.time=7d

          ports:
            - containerPort: 9090

          # ------------------------------------------
          # Probes - Prometheus ships dedicated
          # endpoints for exactly this purpose.
          # ------------------------------------------
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus

      volumes:

        # Scrape configuration from the ConfigMap.
        - name: config
          configMap:
            name: prometheus-config

        # Ephemeral TSDB storage (see header note).
        - name: data
          emptyDir: {}
